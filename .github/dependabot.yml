version: 2

registries:
  github:
    type: "npm-registry"
    url: "https://npm.pkg.github.com"
    token: "${{ secrets.BOT_TOKEN }}"

updates:
  - package-ecosystem: "npm"
    directory: "/"
    commit-message:
      prefix: "chore"
    schedule:
      interval: "daily"
    registries:
      - github
